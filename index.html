---
layout: default
---

<style>
    :root {
        --home-bg: #ffffff;
        --home-text: #333;
        --home-border: #333;
        --home-hover-bg: #333;
        --home-hover-text: #fff;
    }

    html[data-theme="dark"] {
        --home-bg: #0f172a;
        --home-text: #f1f5f9;
        --home-border: #cbd5e1;
        --home-hover-bg: #f1f5f9;
        --home-hover-text: #0f172a;
    }

    /* Estilos generales */
    .main-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 80px 20px;
        max-width: 1200px;
        margin: 0 auto;
        text-align: center;
    }

    /* Estilos para el nombre */
    .name-container {
        margin-bottom: 20px;
    }

    .first-name {
        font-size: 4rem;
        font-weight: 700;
        text-transform: uppercase;
        color: var(--home-text);
        line-height: 1.1;
        margin: 0;
    }

    .last-name {
        font-size: 4rem;
        font-weight: 700;
        text-transform: uppercase;
        color: var(--home-text);
        line-height: 1.1;
        margin: 0;
    }

    /* Estilos para el subtítulo */
    .tagline {
        font-size: 1.5rem;
        color: var(--home-text);
        margin-top: 20px;
        margin-bottom: 60px;
    }

    /* Estilos para los botones de navegación */
    .nav-buttons {
        display: flex;
        gap: 20px;
        justify-content: center;
    }

    .nav-button {
        display: inline-flex;
        align-items: center;
        padding: 12px 24px;
        border: 1px solid var(--home-border);
        border-radius: 4px;
        text-decoration: none;
        color: var(--home-text);
        font-weight: 500;
        transition: all 0.3s ease;
    }

    .nav-button:hover {
        background-color: var(--home-hover-bg);
        color: var(--home-hover-text);
    }

    .nav-button i {
        margin-right: 10px;
    }

    /* Estilos responsivos */
    @media (max-width: 768px) {

        .first-name,
        .last-name {
            font-size: 3rem;
        }

        .tagline {
            font-size: 1.2rem;
        }

        .nav-buttons {
            flex-direction: column;
            align-items: center;
        }
    }
</style>

<div class="main-container">
    <div class="name-container">
        <h1 class="first-name">Francisco</h1>
        <h1 class="last-name">Richter-Mendoza</h1>
    </div>

    <p class="tagline">Mathematics, Data Science, and (A) Intelligence</p>

    <div class="nav-buttons">
        <a href="/teaching/" class="nav-button">
            <i>🎓</i> Teaching
        </a>
        <a href="/publications/" class="nav-button">
            <i>📚</i> Research
        </a>
        <a href="/applications/" class="nav-button">
            <i>🧩</i> Applications
        </a>
    </div>
</div>
