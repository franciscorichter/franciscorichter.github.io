---
layout: default
---

<style>
    :root {
        --home-bg: #f8fafc;
        --home-text: #1f2933;
        --home-border: rgba(31, 41, 51, 0.65);
        --home-hover-bg: #1f2933;
        --home-hover-text: #fff;
        --home-accent-a: #38bdf8;
        --home-accent-b: #a855f7;
    }

    html[data-theme="dark"] {
        --home-bg: #030712;
        --home-text: #f1f5f9;
        --home-border: rgba(241, 245, 249, 0.6);
        --home-hover-bg: #f1f5f9;
        --home-hover-text: #030712;
        --home-accent-a: #2dd4bf;
        --home-accent-b: #818cf8;
    }

    body {
        background: var(--home-bg);
        margin: 0;
    }

    .hero-bg {
        position: relative;
        min-height: 100vh;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: clamp(3rem, 8vw, 6rem) 1.5rem;
        isolation: isolate;
    }

    .hero-bg::before,
    .hero-bg::after {
        content: "";
        position: absolute;
        width: 380px;
        height: 380px;
        border-radius: 50%;
        filter: blur(80px);
        opacity: 0.5;
        z-index: 0;
    }

    .hero-bg::before {
        background: radial-gradient(circle, var(--home-accent-a), transparent 55%);
        top: 10%;
        left: 5%;
        animation: float-left 18s ease-in-out infinite;
    }

    .hero-bg::after {
        background: radial-gradient(circle, var(--home-accent-b), transparent 60%);
        bottom: 5%;
        right: 0;
        animation: float-right 22s ease-in-out infinite;
    }

    .background-grid {
        position: absolute;
        inset: 0;
        background-image: linear-gradient(rgba(255, 255, 255, 0.08) 1px, transparent 1px),
            linear-gradient(90deg, rgba(255, 255, 255, 0.08) 1px, transparent 1px);
        background-size: 80px 80px;
        opacity: 0.35;
        z-index: 0;
        animation: grid-pan 30s linear infinite;
    }

    html[data-theme="dark"] .background-grid {
        opacity: 0.15;
    }

    /* Estilos generales */
    .main-container {
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 80px 20px;
        max-width: 1200px;
        margin: 0 auto;
        text-align: center;
        background: rgba(255, 255, 255, 0.88);
        border-radius: 32px;
        box-shadow: 0 20px 80px rgba(15, 23, 42, 0.15);
        border: 1px solid rgba(255, 255, 255, 0.4);
    }

    html[data-theme="dark"] .main-container {
        background: rgba(3, 7, 18, 0.78);
        border: 1px solid rgba(148, 163, 184, 0.25);
        box-shadow: 0 25px 70px rgba(2, 6, 23, 0.9);
    }

    /* Estilos para el nombre */
    .name-container {
        margin-bottom: 20px;
    }

    .first-name {
        font-size: 4rem;
        font-weight: 700;
        text-transform: uppercase;
        color: var(--home-text);
        line-height: 1.1;
        margin: 0;
    }

    .last-name {
        font-size: 4rem;
        font-weight: 700;
        text-transform: uppercase;
        color: var(--home-text);
        line-height: 1.1;
        margin: 0;
    }

    /* Estilos para el subtítulo */
    .tagline {
        font-size: 1.5rem;
        color: var(--home-text);
        margin-top: 20px;
        margin-bottom: 60px;
    }

    /* Estilos para los botones de navegación */
    .nav-buttons {
        display: flex;
        gap: 20px;
        justify-content: center;
    }

    .nav-button {
        display: inline-flex;
        align-items: center;
        padding: 12px 24px;
        border: 1px solid var(--home-border);
        border-radius: 4px;
        text-decoration: none;
        color: var(--home-text);
        font-weight: 500;
        transition: all 0.3s ease;
    }

    .nav-button:hover {
        background-color: var(--home-hover-bg);
        color: var(--home-hover-text);
    }

    .nav-button i {
        margin-right: 10px;
    }

    /* Estilos responsivos */
    @media (max-width: 768px) {

        .first-name,
        .last-name {
            font-size: 3rem;
        }

        .tagline {
            font-size: 1.2rem;
        }

        .nav-buttons {
            flex-direction: column;
            align-items: center;
        }
    }

    @keyframes float-left {
        0% {
            transform: translate(0, 0) scale(1);
        }

        50% {
            transform: translate(40px, -30px) scale(1.1);
        }

        100% {
            transform: translate(-10px, 20px) scale(1);
        }
    }

    @keyframes float-right {
        0% {
            transform: translate(0, 0) scale(1);
        }

        50% {
            transform: translate(-35px, 45px) scale(0.95);
        }

        100% {
            transform: translate(20px, -25px) scale(1);
        }
    }

    @keyframes grid-pan {
        0% {
            background-position: 0 0, 0 0;
        }

        100% {
            background-position: 80px 80px, 80px 80px;
        }
    }

    @media (prefers-reduced-motion: reduce) {
        .hero-bg::before,
        .hero-bg::after,
        .background-grid {
            animation: none !important;
        }
    }
</style>

<div class="hero-bg">
    <div class="background-grid" aria-hidden="true"></div>
    <div class="main-container">
        <div class="name-container">
            <h1 class="first-name">Francisco</h1>
            <h1 class="last-name">Richter-Mendoza</h1>
        </div>

        <p class="tagline">Mathematics, Data Science, and (A) Intelligence</p>

        <div class="nav-buttons">
            <a href="/teaching/" class="nav-button">
                <i>🎓</i> Teaching
            </a>
            <a href="/publications/" class="nav-button">
                <i>📚</i> Research
            </a>
            <a href="/applications/" class="nav-button">
                <i>🧩</i> Applications
            </a>
        </div>
    </div>
</div>
