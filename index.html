---
layout: default
---

<style>
    :root {
        --home-bg: #f8fafc;
        --home-text: #1f2933;
        --home-border: rgba(31, 41, 51, 0.65);
        --home-hover-bg: #1f2933;
        --home-hover-text: #fff;
        --home-accent-a: #38bdf8;
        --home-accent-b: #a855f7;
    }

    html[data-theme="dark"] {
        --home-bg: #030712;
        --home-text: #f1f5f9;
        --home-border: rgba(241, 245, 249, 0.6);
        --home-hover-bg: #f1f5f9;
        --home-hover-text: #030712;
        --home-accent-a: #2dd4bf;
        --home-accent-b: #818cf8;
    }

    body {
        background: var(--home-bg);
        margin: 0;
    }

    .hero-bg {
        position: relative;
        min-height: 100vh;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: clamp(3rem, 8vw, 6rem) 1.5rem;
        isolation: isolate;
    }

    .hero-bg::before,
    .hero-bg::after {
        content: "";
        position: absolute;
        width: 380px;
        height: 380px;
        border-radius: 50%;
        filter: blur(80px);
        opacity: 0.5;
        z-index: 0;
    }

    .hero-bg::before {
        background: radial-gradient(circle, var(--home-accent-a), transparent 55%);
        top: 10%;
        left: 5%;
        animation: float-left 18s ease-in-out infinite;
    }

    .hero-bg::after {
        background: radial-gradient(circle, var(--home-accent-b), transparent 60%);
        bottom: 5%;
        right: 0;
        animation: float-right 22s ease-in-out infinite;
    }

    .background-grid {
        position: absolute;
        inset: 0;
        background-image: linear-gradient(rgba(255, 255, 255, 0.08) 1px, transparent 1px),
            linear-gradient(90deg, rgba(255, 255, 255, 0.08) 1px, transparent 1px);
        background-size: 80px 80px;
        opacity: 0.35;
        z-index: 0;
        animation: grid-pan 30s linear infinite;
    }

    html[data-theme="dark"] .background-grid {
        opacity: 0.15;
    }

    /* Estilos generales */
    .main-container {
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 80px 20px;
        max-width: 1200px;
        margin: 0 auto;
        text-align: center;
        background: rgba(255, 255, 255, 0.88);
        border-radius: 32px;
        box-shadow: 0 20px 80px rgba(15, 23, 42, 0.15);
        border: 1px solid rgba(255, 255, 255, 0.4);
    }

    html[data-theme="dark"] .main-container {
        background: rgba(3, 7, 18, 0.78);
        border: 1px solid rgba(148, 163, 184, 0.25);
        box-shadow: 0 25px 70px rgba(2, 6, 23, 0.9);
    }

    /* Estilos para el nombre */
    .name-container {
        margin-bottom: 20px;
    }

    .hero-name {
        font-size: clamp(3rem, 8vw, 4.5rem);
        font-weight: 700;
        text-transform: uppercase;
        color: var(--home-text);
        line-height: 1.1;
        margin: 0;
    }

    .hero-name span:last-child {
        display: inline-block;
        margin-left: 0.5rem;
        color: var(--home-accent-b);
    }

    /* Estilos para el subtítulo */
    .tagline {
        font-size: 1.5rem;
        color: var(--home-text);
        margin-top: 20px;
        margin-bottom: 60px;
    }

    /* Estilos para los botones de navegación */
    .nav-buttons {
        display: flex;
        gap: 20px;
        justify-content: center;
    }

    .nav-button {
        display: inline-flex;
        align-items: center;
        padding: 12px 24px;
        border: 1px solid var(--home-border);
        border-radius: 4px;
        text-decoration: none;
        color: var(--home-text);
        font-weight: 500;
        transition: all 0.3s ease;
    }

    .nav-button:hover {
        background-color: var(--home-hover-bg);
        color: var(--home-hover-text);
    }

    .nav-button i {
        margin-right: 10px;
    }

    .application-links {
        margin-top: 3rem;
        width: 100%;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 1.25rem;
    }

    .application-card {
        display: flex;
        align-items: center;
        gap: 1rem;
        padding: 1.25rem 1.5rem;
        border-radius: 20px;
        border: 1px solid rgba(31, 41, 55, 0.08);
        background: rgba(255, 255, 255, 0.92);
        box-shadow: 0 18px 45px rgba(15, 23, 42, 0.08);
        text-decoration: none;
        color: inherit;
        transition: transform 0.25s ease, border-color 0.25s ease;
    }

    html[data-theme="dark"] .application-card {
        background: rgba(3, 7, 18, 0.85);
        border-color: rgba(148, 163, 184, 0.18);
        box-shadow: 0 20px 55px rgba(2, 6, 23, 0.8);
    }

    .application-card:hover {
        transform: translateY(-4px);
        border-color: rgba(56, 189, 248, 0.5);
    }

    .application-icon {
        width: 52px;
        height: 52px;
        border-radius: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(56, 189, 248, 0.1);
    }

    .application-card:nth-child(2) .application-icon {
        background: rgba(129, 140, 248, 0.12);
    }

    .application-info h3 {
        margin: 0;
        font-size: 1.1rem;
        font-weight: 600;
    }

    .application-info p {
        margin: 0.25rem 0 0;
        color: var(--home-text);
        font-size: 0.95rem;
        opacity: 0.75;
    }

    /* Estilos responsivos */
    @media (max-width: 768px) {

        .hero-name {
            font-size: 2.5rem;
        }

        .tagline {
            font-size: 1.2rem;
        }

        .nav-buttons {
            flex-direction: column;
            align-items: center;
        }

        .application-links {
            grid-template-columns: 1fr;
        }
    }

    @keyframes float-left {
        0% {
            transform: translate(0, 0) scale(1);
        }

        50% {
            transform: translate(40px, -30px) scale(1.1);
        }

        100% {
            transform: translate(-10px, 20px) scale(1);
        }
    }

    @keyframes float-right {
        0% {
            transform: translate(0, 0) scale(1);
        }

        50% {
            transform: translate(-35px, 45px) scale(0.95);
        }

        100% {
            transform: translate(20px, -25px) scale(1);
        }
    }

    @keyframes grid-pan {
        0% {
            background-position: 0 0, 0 0;
        }

        100% {
            background-position: 80px 80px, 80px 80px;
        }
    }

    @media (prefers-reduced-motion: reduce) {
        .hero-bg::before,
        .hero-bg::after,
        .background-grid {
            animation: none !important;
        }
    }
</style>

<div class="hero-bg">
    <div class="background-grid" aria-hidden="true"></div>
    <div class="main-container">
        <div class="name-container">
            <h1 class="hero-name"><span>Francisco</span><span>Richter</span></h1>
        </div>

        <p class="tagline">Mathematics, Data Science, and (A) Intelligence</p>

        <div class="nav-buttons">
            <a href="/teaching/" class="nav-button">
                <i>🎓</i> Teaching
            </a>
            <a href="/publications/" class="nav-button">
                <i>📚</i> Research
            </a>
            <a href="/applications/" class="nav-button">
                <i>🧩</i> Applications
            </a>
        </div>

        <div class="application-links">
            <a class="application-card" href="https://www.whitebox.cl" target="_blank" rel="noreferrer">
                <div class="application-icon" aria-hidden="true">
                    <svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect x="4" y="4" width="20" height="20" rx="4" stroke="currentColor" stroke-width="2" />
                        <rect x="10" y="10" width="8" height="8" rx="2" fill="currentColor" />
                    </svg>
                </div>

                </div>
            </a>

            <a class="application-card" href="https://www.meta-for.xyz" target="_blank" rel="noreferrer">
                <div class="application-icon" aria-hidden="true">
                    <svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M14 4L9 12H13L8 20" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                        <path d="M20 12L15 20H19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                </div>
                <div class="application-info">
                    <h3>Meta-for</h3>
                    <p>Minimalist decision systems rooted in ecological intelligence.</p>
                </div>
            </a>
        </div>
    </div>
</div>
